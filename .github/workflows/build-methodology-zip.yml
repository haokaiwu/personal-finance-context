name: Build Methodology ZIP

on:
  push:
    branches: [main]
    paths:
      - 'methodology/methodology-master-doc.md'
      - 'methodology/assessment/assessment-overview.md'
      - 'methodology/career/career-overview.md'
      - 'methodology/investing/investing-overview.md'
      - 'methodology/life-events/life-events-overview.md'
      - 'methodology/spending/spending-overview.md'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Collect files into flat directory and create ZIP
        run: |
          mkdir -p staging
          cp methodology/methodology-master-doc.md staging/
          cp methodology/assessment/assessment-overview.md staging/
          cp methodology/career/career-overview.md staging/
          cp methodology/investing/investing-overview.md staging/
          cp methodology/life-events/life-events-overview.md staging/
          cp methodology/spending/spending-overview.md staging/
          cd staging
          zip ../methodology-files.zip *.md

      - name: Move latest tag to current commit
        run: |
          git tag -f latest
          git push origin latest --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release (keep tag)
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create fresh release on current commit
        run: |
          gh release create latest methodology-files.zip \
            --title "Methodology Files (Latest)" \
            --notes "Auto-generated ZIP of the methodology files. Updated on every push to main.

          **Included files:**
          - methodology-master-doc.md
          - assessment-overview.md
          - career-overview.md
          - investing-overview.md
          - life-events-overview.md
          - spending-overview.md

          Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
